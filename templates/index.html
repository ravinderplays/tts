<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text to Speech App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <link rel="stylesheet"  href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Loading overlay -->
    <div class="overlay" id="loadingOverlay">
    <div class="spinner-box">
        <i class="fa-solid fa-spinner fa-spin"></i>
        <p>Generating audio...</p>
        <small>Please wait a moment</small>
    </div>
    </div>

<!-- Header -->
<div class="header">
  <i class="fa-solid fa-volume-high"></i>
  <div>
    <h1>Text to Speech</h1>
    <p>Natural voices · Male &amp; Female · Multiple languages</p>
  </div>
</div>

<div class="container">
  <div class="card">

    <!-- Language dropdown -->
    <label>
      <i class="fa-solid fa-language" style="margin-right:5px;"></i>Select language
    </label>
    <select id="langDropdown" onchange="setLang(this.value, this)" style="margin-bottom:14px;">
      <option value="pa">ਪੰਜਾਬੀ — Punjabi</option>
      <option value="en">🇬🇧 English</option>
      <option value="hi">हिन्दी — Hindi</option>
      <!-- <option value="ur">اردو — Urdu</option>
      <option value="gu">ગુજરાતી — Gujarati</option> -->
      <option value="ta">தமிழ் — Tamil</option>
    </select>

    <!-- Voice dropdown -->
    <div style="margin-bottom:14px;">
      <label>
        <i class="fa-solid fa-microphone" style="margin-right:5px;"></i>Select voice
      </label>
      <select id="voiceDropdown" onchange="selectVoice(this.value)">
      </select>
    </div>

    <!-- Text input -->
    <label>
      <i class="fa-solid fa-pen-to-square" style="margin-right:5px;"></i>Enter text
      <span class="lang-badge" id="langBadge">Punjabi</span>
    </label>
    <textarea id="inputText" oninput="updateCount()">{{ text }}</textarea>
    <div class="char-count"><span id="charCount">{{ text|length }}</span> characters</div>

    <!-- Speed & Pitch sliders -->
    <div class="grid-2" style="margin-top:16px;">
      <div>
        <label>
          <i class="fa-solid fa-gauge" style="margin-right:4px;"></i>Speed
          <span class="slider-val" id="rateVal">0%</span>
        </label>
        <div class="slider-row">
          <span style="font-size:11px;color:#999;">Slow</span>
          <input type="range" id="rateSlider" min="-50" max="50" step="5" value="0"
            oninput="document.getElementById('rateVal').textContent = this.value + '%'">
          <span style="font-size:11px;color:#999;">Fast</span>
        </div>
      </div>
      <div>
        <label>
          <i class="fa-solid fa-music" style="margin-right:4px;"></i>Pitch
          <span class="slider-val" id="pitchVal">0Hz</span>
        </label>
        <div class="slider-row">
          <span style="font-size:11px;color:#999;">Low</span>
          <input type="range" id="pitchSlider" min="-20" max="20" step="5" value="0"
            oninput="document.getElementById('pitchVal').textContent = this.value + 'Hz'">
          <span style="font-size:11px;color:#999;">High</span>
        </div>
      </div>
    </div>

    <!-- Quick samples -->
    <div style="margin-top:14px;">
      <label>Quick samples</label>
      <div class="samples" id="samplesBox"></div>
    </div>

  </div><!-- /.card -->

  <!-- Generate button -->
    <button class="generate-btn" id="generateBtn" onclick="submitForm()">
        <span id="btnContent">
            <i class="fa-solid fa-play" style="margin-right:8px;"></i>Generate speech
        </span>
        <span id="btnLoader" style="display:none;">
            <i class="fa-solid fa-spinner fa-spin" style="margin-right:8px;"></i>Generating audio...
        </span>
    </button>

  <!-- Audio result -->
  {% if audio %}
  <div class="audio-card">
    <p class="audio-title">
      <i class="fa-solid fa-circle-check" style="margin-right:5px;"></i>
      {{ voice_name }} &nbsp;|&nbsp; {{ lang_name }}
    </p>
    <audio controls src="/audio" autoplay></audio>
    <a href="/audio" download="speech.mp3" class="dl-btn">
      <i class="fa-solid fa-download"></i> Download MP3
    </a>
  </div>
  {% endif %}

  <!-- Error -->
  {% if error %}
  <div class="error">
    <i class="fa-solid fa-circle-exclamation" style="margin-right:6px;"></i>{{ error }}
  </div>
  {% endif %}

  <!-- <div class="footer">
    Powered by Microsoft Edge TTS &nbsp;&middot;&nbsp; Natural Neural Voices
  </div> -->
</div>

<script>
// ── Language metadata ──────────────────────────────────────────
const langData = {
  pa: { badge: 'Punjabi (pa)',   placeholder: 'ਸਤ ਸ੍ਰੀ ਅਕਾਲ, ਤੁਸੀਂ ਕਿਵੇਂ ਹੋ?',           samples: ['ਸਤ ਸ੍ਰੀ ਅਕਾਲ', 'ਪੰਜਾਬ ਦੀ ਧਰਤੀ ਬਹੁਤ ਸੁੰਦਰ ਹੈ', 'ਤੁਹਾਡਾ ਨਾਮ ਕੀ ਹੈ?'] },
  en: { badge: 'English (en)',   placeholder: 'Hello! How are you today?',                 samples: ['Hello, how are you?', 'Good morning everyone', 'Welcome to our app'] },
  hi: { badge: 'Hindi (hi)',     placeholder: 'नमस्ते, आप कैसे हैं?',                     samples: ['नमस्ते', 'आप कैसे हैं?', 'धन्यवाद'] },
  ur: { badge: 'Urdu (ur)',      placeholder: 'آپ کیسے ہیں؟',                              samples: ['السلام علیکم', 'آپ کیسے ہیں؟', 'شکریہ', 'خوش آمدید'] },
  gu: { badge: 'Gujarati (gu)',  placeholder: 'નમસ્તે, તમે કેમ છો?',                      samples: ['નમસ્તે', 'તમે કેમ છો?', 'ગુજરાત', 'આભાર'] },
  ta: { badge: 'Tamil (ta)',     placeholder: 'வணக்கம், நீங்கள் எப்படி இருக்கிறீர்கள்?',  samples: ['வணக்கம்', 'நன்றி', 'தமிழ்நாடு'] }
};

// ── Voice data from Flask ──────────────────────────────────────
const voiceData = {{ voices_json|safe }};
const langVoiceMemory = {};
let currentLang  = '{{ lang }}'  || 'pa';
let currentVoice = '{{ voice }}' || '';

// ── Set language tab ──────────────────────────────────────────
function setLang(lang) {
  currentLang  = lang;
  currentVoice = '';   // ← reset voice so renderVoices picks first as default

  document.getElementById('langDropdown').value     = lang;
  document.getElementById('langBadge').textContent  = langData[lang].badge;
  document.getElementById('inputText').placeholder  = langData[lang].placeholder;

  renderVoices(lang);  // ← this will auto-select first voice
  renderSamples(lang);

  // trigger pitch slider state for default voice
  selectVoice(currentVoice);
}

// ── Render voice cards ────────────────────────────────────────

function renderVoices(lang) {
  const voices = voiceData[lang] || [];
  const select = document.getElementById('voiceDropdown');

  select.innerHTML = voices.map((v) => {
    const genderIcon = v.gender === 'male' ? '👨' : v.gender === 'female' ? '👩' : '🔊';
    return `<option value="${v.id}">${genderIcon} ${v.name}</option>`;
  }).join('');

  if (voices.length > 0) {
    // ✅ Restore last selected voice for this language, else use first
    const remembered = langVoiceMemory[lang];
    const exists     = voices.some(v => v.id === remembered);
    currentVoice     = (remembered && exists) ? remembered : voices[0].id;
    select.value     = currentVoice;
  }
}

// ── Select voice card ─────────────────────────────────────────
function selectVoice(id) {
  currentVoice = id;
  document.getElementById('voiceDropdown').value = id;

  // ✅ Remember this voice choice for current language
  langVoiceMemory[currentLang] = id;

  // Disable pitch slider for gTTS voices
  const isEdge = id.includes('Neural');
  const pitchParent = document.getElementById('pitchSlider').parentElement;
  pitchParent.style.opacity = isEdge ? '1' : '0.4';
  document.getElementById('pitchSlider').disabled = !isEdge;
}

// ── Render sample buttons ─────────────────────────────────────
function renderSamples(lang) {
  document.getElementById('samplesBox').innerHTML =
    langData[lang].samples
      .map(s => `<button class="sample-btn" onclick="setSample('${s}')">${s}</button>`)
      .join('');
}

// ── Helpers ───────────────────────────────────────────────────
function updateCount() {
  document.getElementById('charCount').textContent =
    document.getElementById('inputText').value.length;
}

function setSample(text) {
  document.getElementById('inputText').value = text;
  updateCount();
}

// ── Submit form ───────────────────────────────────────────────
function submitForm() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { alert('Please enter some text first.'); return; }

  // ── Show loader ──
  document.getElementById('loadingOverlay').classList.add('show');
  document.getElementById('btnContent').style.display = 'none';
  document.getElementById('btnLoader').style.display  = 'inline';
  document.getElementById('generateBtn').disabled     = true;

  const rate  = document.getElementById('rateSlider').value;
  const pitch = document.getElementById('pitchSlider').value;
  const form  = document.createElement('form');
  form.method = 'POST';
  form.action = '/tts';
  [['text', text], ['lang', currentLang], ['voice', currentVoice],
   ['rate', rate],  ['pitch', pitch]].forEach(([k, v]) => {
    const inp = document.createElement('input');
    inp.type = 'hidden'; inp.name = k; inp.value = v;
    form.appendChild(inp);
  });
  document.body.appendChild(form);
  form.submit();
}

// ── Restore state on page load ────────────────────────────────
(function init() {
  const lang  = '{{ lang }}'  || 'pa';
  const voice = '{{ voice }}' || '';
  const rate  = '{{ rate }}'  || '0';
  const pitch = '{{ pitch }}' || '0';

  // restore language
  setLang(lang);

  // ✅ restore exact voice user selected
  if (voice) {
    currentVoice = voice;
    document.getElementById('voiceDropdown').value = voice;
    selectVoice(voice);
  }

  // restore sliders
  document.getElementById('rateSlider').value          = rate;
  document.getElementById('pitchSlider').value         = pitch;
  document.getElementById('rateVal').textContent       = rate  + '%';
  document.getElementById('pitchVal').textContent      = pitch + 'Hz';

  updateCount();
})();
</script>

</body>
</html>
